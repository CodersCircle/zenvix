name: Hostix CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Restore dependencies
      run: dotnet restore ./src/Hostix.sln

    - name: Build
      run: dotnet build ./src/Hostix.sln --no-restore --configuration Release

    - name: Test
      run: dotnet test ./src/Hostix.sln --no-build --verbosity normal

    - name: Publish Portable
      run: dotnet publish ./src/Hostix.UI/Hostix.UI.csproj -c Release -o ./publish/portable --runtime win-x64 --self-contained true
